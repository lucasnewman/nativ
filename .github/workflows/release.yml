name: Publish macOS Release

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: macos-release
  cancel-in-progress: false

jobs:
  build-notarize-publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    env:
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APP_BUNDLE_ID: ${{ vars.NATIV_BUNDLE_IDENTIFIER }}
      FRAMEWORK_BUNDLE_ID: ${{ vars.NATIV_SERVER_KIT_BUNDLE_IDENTIFIER }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      GH_TOKEN: ${{ github.token }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      NOTARY_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate release configuration
        env:
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          required=(
            APPLE_TEAM_ID APP_BUNDLE_ID FRAMEWORK_BUNDLE_ID
            DEVELOPER_ID_APPLICATION_P12_BASE64
            DEVELOPER_ID_APPLICATION_P12_PASSWORD
            APPLE_API_KEY_P8_BASE64 NOTARY_KEY_ID NOTARY_ISSUER
            SPARKLE_PRIVATE_KEY
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing repository variable or secret: $name"
              exit 1
            fi
          done
          version="${RELEASE_TAG#v}"
          if [[ ! "$version" =~ ^[0-9]+([.][0-9]+){1,2}$ ]]; then
            echo "::error::Release tag must be vMAJOR.MINOR[.PATCH], got $RELEASE_TAG"
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Configure project signing values
        run: |
          cat > Configuration/Signing.local.xcconfig <<EOF
          NATIV_BUNDLE_IDENTIFIER = $APP_BUNDLE_ID
          NATIV_SERVER_KIT_BUNDLE_IDENTIFIER = $FRAMEWORK_BUNDLE_ID
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          EOF

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/release-signing.keychain-db"
          keychain_password="$(uuidgen)"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Configure notarization API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          printf '%s' "$API_KEY_BASE64" | base64 -D > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"
          echo "NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

      - name: Read release metadata
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_BUILD_NUMBER=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          jq -r '.release.body // ""' "$GITHUB_EVENT_PATH" \
            > "$RUNNER_TEMP/release-notes.md"

      - name: Build, sign, notarize, and create appcast
        run: |
          scripts/release_macos.sh \
            --build-number "$RELEASE_BUILD_NUMBER" \
            --release-notes "$RUNNER_TEMP/release-notes.md" \
            "$RELEASE_VERSION"

      - name: Upload notarized app to GitHub Release
        run: |
          set -euo pipefail
          asset_path="dist/release/Nativ-${RELEASE_VERSION}.dmg"
          asset_name="$(basename "$asset_path")"
          response_path="$RUNNER_TEMP/release-upload-response.json"
          upload_url="$(jq -r '.release.upload_url // empty' "$GITHUB_EVENT_PATH")"
          upload_url="${upload_url%%\{*}"
          if [[ "$upload_url" != https://uploads.github.com/* ]]; then
            echo "::error::Release event does not contain a valid GitHub upload URL"
            exit 1
          fi

          curl \
            --silent \
            --show-error \
            --fail-with-body \
            --retry 6 \
            --retry-delay 10 \
            --retry-max-time 300 \
            --retry-all-errors \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            --header "Content-Type: application/x-apple-diskimage" \
            --data-binary "@$asset_path" \
            --output "$response_path" \
            "${upload_url}?name=${asset_name}"
          jq -r '"Uploaded \(.name): \(.browser_download_url)"' "$response_path"

      - name: Prepare GitHub Pages feed
        run: |
          mkdir -p dist/release/site
          cp -R website/. dist/release/site/
          cp dist/release/appcast.xml dist/release/site/appcast.xml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/release/site

      - name: Publish appcast after release asset
        id: pages
        uses: actions/deploy-pages@v4
